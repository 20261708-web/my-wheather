<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 한국어 날씨 대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 라이트/다크모드 색상 변수 */
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --accent-color: #3b82f6;
            --alert-bg: #fee2e2;
            --alert-text: #ef4444;
            --border-color: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #f7fafc;
            --text-muted: #a0aec0;
            --accent-color: #60a5fa;
            --alert-bg: #7f1d1d;
            --alert-text: #fca5a5;
            --border-color: #4a5568;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }

        /* 날씨별 동적 배경 */
        .weather-bg-clear { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .weather-bg-cloudy { background: linear-gradient(135deg, #74ebd5 0%, #9ecee6 100%); color: #333; }
        .weather-bg-rain { background: linear-gradient(135deg, #5c6e91 0%, #343f56 100%); color: white; }
        .weather-bg-snow { background: linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%); color: #333; }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: background-color 0.3s;
        }

        /* 검색창 및 컨트롤 */
        .header-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
        }
        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 특보 배너 */
        .alert-banner {
            background-color: var(--alert-bg);
            color: var(--alert-text);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
            font-size: 0.9rem;
        }

        .main-weather { text-align: center; border: none; }
        .main-temp { font-size: 4.5rem; font-weight: 800; margin: 5px 0; }
        .weather-status { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .clothing-tip {
            margin-top: 20px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.25);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 지표 그리드 */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .detail-item {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .detail-item i { font-size: 1.6rem; color: var(--accent-color); }
        .detail-title { font-size: 0.8rem; color: var(--text-muted); }
        .detail-value { font-size: 1rem; font-weight: bold; margin-top: 2px; }

        /* [추가] 주간 예보 표 스타일 */
        .weekly-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .weekly-table tr {
            border-bottom: 1px solid var(--border-color);
        }
        .weekly-table tr:last-child {
            border-bottom: none;
        }
        .weekly-table td {
            padding: 12px 8px;
            font-size: 0.95rem;
            text-align: center;
        }
        .weekly-date { text-align: left !important; font-weight: 600; width: 25%; }
        .weekly-icon { width: 15%; color: var(--accent-color); font-size: 1.1rem; }
        .weekly-desc { text-align: left !important; width: 35%; color: var(--text-muted); font-size: 0.9rem; }
        .weekly-temp { text-align: right !important; width: 25%; font-weight: 600; }
        .t-min { color: #3b82f6; }
        .t-max { color: #ef4444; }

        .chart-container { position: relative; height: 160px; width: 100%; margin-top: 10px; }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <input type="text" id="searchInput" class="search-input" placeholder="지역 이름을 입력하세요 (예: 서울, 부산, 제주)">
        <button class="icon-btn" onclick="searchWeather()"><i class="fas fa-search"></i></button>
        <button class="icon-btn" onclick="getGPSLocation()"><i class="fas fa-location-crosshairs"></i></button>
        <button class="icon-btn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
    </div>

    <div id="alertBanner" class="alert-banner"></div>

    <div id="mainWeatherCard" class="card main-weather weather-bg-clear">
        <h2 id="locationName" style="margin:0; font-size: 1.5rem;">날씨 정보를 불러오는 중...</h2>
        <div class="main-temp" id="currentTemp">--°C</div>
        <div class="weather-status" id="weatherDesc"><i class="fas fa-spinner fa-spin"></i> 대기 중</div>
        <div class="clothing-tip">
            <i class="fas fa-tshirt"></i> <b>오늘의 추천 옷차림:</b> <span id="clothingText">분석 중...</span>
        </div>
    </div>

    <div class="details-grid">
        <div class="detail-item">
            <i class="fas fa-mask"></i>
            <div>
                <div class="detail-title">미세먼지 (PM10)</div>
                <div class="detail-value" id="pm10">--</div>
            </div>
        </div>
        <div class="detail-item">
            <i class="fas fa-sun"></i>
            <div>
                <div class="detail-title">자외선 지수 (UV)</div>
                <div class="detail-value" id="uvIndex">--</div>
            </div>
        </div>
        <div class="detail-item">
            <i class="fas fa-droplet"></i>
            <div>
                <div class="detail-title">습도</div>
                <div class="detail-value" id="humidity">--</div>
            </div>
        </div>
        <div class="detail-item">
            <i class="fas fa-wind"></i>
            <div>
                <div class="detail-title">풍속</div>
                <div class="detail-value" id="windSpeed">--</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-calendar-days"></i> 주간 예보 (7일)</h3>
        <table class="weekly-table" id="weeklyTable">
            </table>
    </div>

    <div class="card">
        <h3><i class="fas fa-clock"></i> 향후 6시간 기온 변화</h3>
        <div class="chart-container">
            <canvas id="hourlyChart"></canvas>
        </div>
    </div>
</div>

<script>
    let hourlyChartInstance = null;

    // 영어 매핑 테이블
    const cityNameMap = {
        "text": "검색지역", "Seoul": "서울", "Busan": "부산", "Incheon": "인천", "Daegu": "대구", 
        "Daejeon": "대전", "Gwangju": "광주", "Ulsan": "울산", "Sejong": "세종",
        "Suwon": "수원", "Jeju": "제주", "Chuncheon": "춘천", "Cheongju": "청주",
        "Jeonju": "전주", "Changwon": "창원", "Pohang": "포항", "Gyeongju": "경주"
    };

    function toggleDarkMode() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    async function searchWeather() {
        const cityInput = document.getElementById('searchInput').value.trim();
        if (!cityInput) return alert("지역 이름을 입력해주세요!");

        try {
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=ko&format=json`;
            const response = await fetch(geoUrl);
            const data = await response.json();

            if (data.results && data.results.length > 0) {
                const target = data.results[0];
                let finalName = cityNameMap[target.name] || target.name;
                if (!/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(finalName)) {
                    finalName = cityInput;
                }
                fetchWeatherData(target.latitude, target.longitude, finalName);
            } else {
                alert("지역을 찾을 수 없습니다. 정확한 행정구역 명칭으로 입력해 보세요! (예: 서울, 부산, 부천)");
            }
        } catch (error) {
            alert("지역 검색 중 오류가 발생했습니다.");
        }
    }

    function getGPSLocation() {
        if (navigator.geolocation) {
            document.getElementById('locationName').innerText = "내 위치 탐색 중...";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    fetchWeatherData(position.coords.latitude, position.coords.longitude, "현재 내 위치");
                },
                () => {
                    alert("위치 권한 승인이 거부되어 기본 지역(서울) 날씨를 보여줍니다.");
                    fetchWeatherData(37.5665, 126.9780, "서울");
                }
            );
        } else {
            alert("이 브라우저에서는 GPS 서비스를 지원하지 않습니다.");
        }
    }

    // [수정] daily 파라미터 추가 요청 (weather_code, 기온 맥스/미니)
    async function fetchWeatherData(lat, lon, locationName) {
        try {
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&hourly=temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
            const envUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10,uv_index`;

            const [weatherRes, envRes] = await Promise.all([fetch(weatherUrl), fetch(envUrl)]);
            const weatherData = await weatherRes.json();
            const envData = await envRes.json();

            updateDashboardUI(weatherData, envData, locationName);
        } catch (error) {
            alert("날씨 데이터를 가져오는 중 오류가 발생했습니다.");
        }
    }

    function parseWeatherCode(code) {
        if (code === 0) return { text: "맑음", icon: "fa-sun", bg: "weather-bg-clear" };
        if ([1, 2, 3].includes(code)) return { text: "구름조금 / 흐림", icon: "fa-cloud", bg: "weather-bg-cloudy" };
        if ([45, 48].includes(code)) return { text: "안개 주의", icon: "fa-smog", bg: "weather-bg-cloudy" };
        if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return { text: "비 / 소나기", icon: "fa-cloud-showers-heavy", bg: "weather-bg-rain" };
        if ([71, 73, 75, 85, 86].includes(code)) return { text: "눈 내림", icon: "fa-snowflake", bg: "weather-bg-snow" };
        if ([95, 96, 99].includes(code)) return { text: "천둥번개 동반", icon: "fa-cloud-bolt", bg: "weather-bg-rain" };
        return { text: "맑음", icon: "fa-sun", bg: "weather-bg-clear" };
    }

    function calculateClothing(temp) {
        if (temp >= 28) return "폭염 날씨입니다. 민소매, 반팔, 얇은 반바지를 입으시고 물을 자주 드세요.";
        if (temp >= 23) return "반팔 티셔츠, 얇은 셔츠, 반바지나 면바지가 적당합니다.";
        if (temp >= 20) return "가벼운 긴팔, 얇은 가디건, 청바지 조합을 추천합니다.";
        if (temp >= 17) return "맨투맨, 니트, 조끼 등 가벼운 외투를 겹쳐 입기 좋은 날씨입니다.";
        if (temp >= 12) return "자켓, 트렌치코트, 셔츠에 가디건을 레이어드 하세요.";
        if (temp >= 9) return "꽤 쌀쌀합니다. 코트, 가죽 자켓, 기모 처리된 옷을 입으세요.";
        return "한파 기온입니다. 패딩, 두꺼운 코트, 목도리를 꼭 착용하여 체온을 유지하세요.";
    }

    function updateDashboardUI(weather, env, locName) {
        const cur = weather.current;
        const air = env.current;
        const daily = weather.daily;
        
        document.getElementById('locationName').innerText = locName;
        document.getElementById('currentTemp').innerText = Math.round(cur.temperature_2m) + "°C";
        document.getElementById('humidity').innerText = cur.relative_humidity_2m + "%";
        document.getElementById('windSpeed').innerText = cur.wind_speed_10m + " m/s";
        
        const pmVal = Math.round(air.pm10);
        let pmStatus = pmVal <= 30 ? "좋음" : pmVal <= 80 ? "보통" : pmVal <= 150 ? "나쁨" : "매우나쁨";
        document.getElementById('pm10').innerText = `${pmStatus} (${pmVal}µg/m³)`;

        const uvVal = air.uv_index;
        let uvStatus = uvVal <= 2 ? "낮음" : uvVal <= 5 ? "보통" : uvVal <= 7 ? "높음" : "위험";
        document.getElementById('uvIndex').innerText = `${uvStatus} (${uvVal})`;

        const weatherMeta = parseWeatherCode(cur.weather_code);
        document.getElementById('weatherDesc').innerHTML = `<i class="fas ${weatherMeta.icon}"></i> ${weatherMeta.text}`;
        document.getElementById('mainWeatherCard').className = `card main-weather ${weatherMeta.bg}`;

        document.getElementById('clothingText').innerText = calculateClothing(cur.temperature_2m);

        // 특보 조건문
        const alertBanner = document.getElementById('alertBanner');
        if (cur.temperature_2m >= 33) {
            alertBanner.style.display = "block";
            alertBanner.innerHTML = `<i class="fas fa-triangle-exclamation"></i> [기상특보] 폭염 경보! 야외 활동을 자제하고 수분을 섭취하세요.`;
        } else if ([65, 82].includes(cur.weather_code)) {
            alertBanner.style.display = "block";
            alertBanner.innerHTML = `<i class="fas fa-triangle-exclamation"></i> [기상특보] 호우 경보! 많은 비가 내리고 있으니 안전에 유의하세요.`;
        } else if (pmVal > 150) {
            alertBanner.style.display = "block";
            alertBanner.innerHTML = `<i class="fas fa-triangle-exclamation"></i> [대기질경보] 미세먼지 최악! 외출 시 황사마스크를 꼭 착용하세요.`;
        } else {
            alertBanner.style.display = "none";
        }

        // --- [추가] 일주일 날씨 예보 렌더링 엔진 ---
        const weeklyTable = document.getElementById('weeklyTable');
        weeklyTable.innerHTML = ''; 
        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

        for(let i=0; i<daily.time.length; i++) {
            const dateObj = new Date(daily.time[i]);
            const month = dateObj.getMonth() + 1;
            const date = dateObj.getDate();
            const dayName = dayNames[dateObj.getDay()];
            
            // 날짜 표시 (오늘인 경우 '오늘'로 표시)
            const dateDisplay = i === 0 ? "오늘" : `${month}/${date}(${dayName})`;
            const dayWeather = parseWeatherCode(daily.weather_code[i]);
            const maxT = Math.round(daily.temperature_2m_max[i]);
            const minT = Math.round(daily.temperature_2m_min[i]);

            const row = `
                <tr>
                    <td class="weekly-date">${dateDisplay}</td>
                    <td class="weekly-icon"><i class="fas ${dayWeather.icon}"></i></td>
                    <td class="weekly-desc">${dayWeather.text}</td>
                    <td class="weekly-temp">
                        <span class="t-min">${minT}°</span> / <span class="t-max">${maxT}°</span>
                    </td>
                </tr>
            `;
            weeklyTable.innerHTML += row;
        }

        // 차트 업데이트
        const curTimeStr = cur.time;
        const startIndex = weather.hourly.time.indexOf(curTimeStr);
        const safeIndex = startIndex !== -1 ? startIndex : 0;

        const nextTimes = weather.hourly.time.slice(safeIndex, safeIndex + 6).map(t => t.split('T')[1]);
        const nextTemps = weather.hourly.temperature_2m.slice(safeIndex, safeIndex + 6);

        renderHourlyChart(nextTimes, nextTemps);
    }

    function renderHourlyChart(labels, data) {
        const ctx = document.getElementById('hourlyChart').getContext('2d');
        if (hourlyChartInstance) {
            hourlyChartInstance.destroy();
        }

        hourlyChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '기온 (°C)',
                    data: data,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false } },
                    y: { ticks: { stepSize: 2 } }
                }
            }
        });
    }

    window.onload = function() {
        fetchWeatherData(37.5665, 126.9780, "서울");
    };
</script>

</body>
</html>
